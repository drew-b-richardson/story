<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Story Roleplay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0d0e;
    --surface: #1a1618;
    --surface2: #221e20;
    --border: #2e2628;
    --accent: #c8748a;
    --accent2: #e8a0b0;
    --text: #e8dfe2;
    --muted: #7a6b70;
    --user-bubble: #1e2a32;
    --her-bubble: #2a1a1f;
    --radius: 16px;
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Setup screen ── */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    flex: 1;
    overflow-y: auto;
  }

  /* Step panels */
  .setup-step {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    flex: 1;
    padding: 2rem 1.5rem;
    gap: 1.5rem;
  }
  .setup-step.active { display: flex; }

  .setup-step h1 {
    font-size: 2rem;
    font-weight: normal;
    color: var(--accent2);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .setup-step p.subtitle {
    color: var(--muted);
    font-style: italic;
    font-size: 0.95rem;
    text-align: center;
  }

  /* Gender picker */
  .gender-buttons {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .gender-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    font-family: inherit;
    min-width: 110px;
  }

  .gender-btn:hover { transform: translateY(-2px); background: var(--surface2); }
  .gender-btn:active { transform: translateY(0); }

  .gender-btn .symbol {
    font-size: 2.8rem;
    line-height: 1;
  }

  .gender-btn .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .gender-btn.female { border-color: #c06080; }
  .gender-btn.female:hover { border-color: #e080a0; background: #2a1520; }
  .gender-btn.female .symbol { color: #e080a0; }

  .gender-btn.male { border-color: #406090; }
  .gender-btn.male:hover { border-color: #6090c0; background: #151a2a; }
  .gender-btn.male .symbol { color: #6090c0; }

  .gender-btn.random { border-color: var(--border); }
  .gender-btn.random:hover { border-color: var(--muted); }
  .gender-btn.random .symbol { color: var(--muted); }

  /* Story list step */
  #step-stories {
    padding-top: 1rem;
  }

  .stories-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 600px;
  }

  .btn-back {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
    min-height: 44px;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--accent2); }

  .stories-header h2 {
    font-size: 1.1rem;
    font-weight: normal;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  #story-list {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    padding-bottom: 2rem;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.4rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
    font-family: inherit;
    color: var(--text);
    width: 100%;
  }

  .story-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .story-card:disabled { opacity: 0.4; cursor: default; }

  .story-card .story-title {
    font-size: 1rem;
    color: var(--accent2);
    margin-bottom: 0.4rem;
    text-transform: capitalize;
  }

  .story-card .story-summary {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.55;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    padding: 0.65rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
    min-height: 44px;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.65rem 1.2rem;
    transition: opacity 0.15s, background 0.15s;
  }

  button:disabled { opacity: 0.4; cursor: default; }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-secondary:hover:not(:disabled) { background: var(--border); }

  #setup-status {
    text-align: center;
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    min-height: 1.4em;
    width: 100%;
    max-width: 600px;
  }

  /* ── Save cards ── */
  #saves-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  .save-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
    width: 100%;
  }

  .save-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .save-title {
    font-size: 0.95rem;
    color: var(--accent2);
    margin-bottom: 0.3rem;
    text-transform: capitalize;
  }

  .save-meta {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.4;
  }

  /* ── Chat screen ── */
  #chat-screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #chat-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  #char-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: #fff;
    flex-shrink: 0;
  }

  #char-info { flex: 1; min-width: 0; }
  #char-name { font-size: 1.05rem; color: var(--accent2); }
  #char-meta { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 0.1rem; }
  #char-meta-expand { background: none; border: none; color: var(--accent); font-size: 0.75rem; font-style: italic; cursor: pointer; padding: 0; margin-left: 0.3em; }

  #chat-header-icons {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  @media (max-width: 640px) {
    #chat-header {
      gap: 0.5rem;
    }
    #chat-header-icons {
      flex-basis: 100%;
      margin-top: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
    }
  }

  #btn-new-story {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.55rem 0.9rem;
    min-height: 44px;
  }

  #btn-new-story:hover { border-color: var(--accent); color: var(--accent2); }

  #btn-mute {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0.55rem 0.75rem;
    border-radius: 8px;
    line-height: 1;
    min-width: 44px;
    min-height: 44px;
  }
  #btn-mute:hover { border-color: var(--accent); color: var(--accent2); }
  #btn-mute.muted { color: var(--border); border-color: var(--border); }

  #btn-journal {
    position: relative;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0.55rem 0.75rem;
    border-radius: 8px;
    line-height: 1;
    min-width: 44px;
    min-height: 44px;
  }
  #btn-journal:hover { border-color: var(--accent); color: var(--accent2); }
  #btn-journal.has-new { color: var(--accent2); border-color: var(--accent); }
  .journal-badge {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 8px;
    line-height: 16px;
    text-align: center;
    font-weight: 600;
  }

  .journal-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .journal-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .journal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
  }
  .journal-header h3 { margin: 0; font-size: 1rem; color: var(--accent2); font-weight: 500; letter-spacing: 0.05em; }
  .journal-close {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.4rem 0.6rem;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .journal-close:hover { color: var(--accent2); }
  .journal-list { overflow-y: auto; padding: 0.6rem; }
  .journal-entry {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .journal-entry:hover { border-color: var(--accent); }
  .journal-entry.locked {
    cursor: default;
    opacity: 0.4;
    font-style: italic;
  }
  .journal-entry.locked:hover { border-color: var(--border); }
  .journal-entry .je-title {
    font-size: 0.95rem;
    color: var(--accent2);
    margin-bottom: 0.3rem;
  }

  .journal-entry .je-body {
    display: none;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    margin-top: 0.6rem;
  }
  .journal-entry.open .je-body { display: block; }
  .je-play {
    margin-top: 0.6rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0.6rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }
  .je-play:hover { border-color: var(--accent); color: var(--accent2); }

  .journal-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent2);
    padding: 0.8rem 1.2rem;
    border-radius: 8px;
    z-index: 200;
    font-size: 0.9rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: toast-in 0.3s ease-out;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  #loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
  }
  #loading-overlay .loading-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 3rem;
    max-width: calc(100vw - 2rem);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  #loading-overlay .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  #loading-overlay .loading-msg {
    color: var(--accent2);
    font-size: 1rem;
    letter-spacing: 0.04em;
  }

  /* ── Affinity dot (live indicator) ── */
  #affinity-dot {
    font-size: 1.15rem;
    line-height: 1;
    cursor: default;
    user-select: none;
    transition: color 0.6s ease, font-size 0.6s ease, text-shadow 0.6s ease;
    color: hsl(240, 60%, 55%);
    text-shadow: none;
    animation: affinity-pulse 2s ease-in-out infinite;
    animation-play-state: paused;
  }

  #btn-view-recap {
    display: none;
  }
  @keyframes affinity-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }

  /* ── Prior affinity banner (setup screen) ── */
  #prior-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    margin: 0 auto 0.9rem;
    max-width: 600px;
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    display: none;
  }
  #prior-banner strong { color: var(--accent2); font-style: normal; }

  /* ── Recap modal ── */
  #recap-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  #recap-modal.active { display: flex; }
  #recap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem 1.6rem;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  #recap-card h2 { margin: 0 0 1rem; font-size: 1.15rem; color: var(--accent2); }
  .recap-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin: 0.55rem 0;
    font-size: 0.9rem;
  }
  .recap-label { width: 5.5rem; color: var(--muted); }
  .recap-value { width: 3rem; font-variant-numeric: tabular-nums; color: var(--accent2); }
  .recap-spark { flex: 1; height: 22px; }
  .recap-spark polyline { fill: none; stroke-width: 1.5; }
  #recap-narrative {
    margin: 1rem 0 1.2rem;
    padding: 0.7rem 0.9rem;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid var(--accent);
    font-style: italic;
    font-size: 0.9rem;
    color: var(--muted);
    min-height: 1.4em;
  }
  #recap-actions { display: flex; gap: 0.6rem; justify-content: flex-end; flex-wrap: wrap; }
  #recap-actions button {
    padding: 0.65rem 1rem;
    font-size: 0.85rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    min-height: 44px;
  }
  #recap-actions button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  #recap-actions button:hover { border-color: var(--accent); color: var(--accent2); }
  #recap-actions button.primary:hover { color: #fff; }

  #tts-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  #tts-indicator.active { opacity: 1; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .recap-block {
    align-self: center;
    max-width: 90%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    color: var(--muted);
    font-style: italic;
    font-size: 0.92em;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .msg {
    display: flex;
    gap: 0.7rem;
    max-width: 78%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.her  { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    margin-top: 2px;
  }

  .msg.her  .msg-avatar { background: var(--accent); color: #fff; }
  .msg.user .msg-avatar { background: var(--user-bubble); color: var(--muted); border: 1px solid var(--border); }

  .bubble {
    padding: 0.75rem 1rem;
    border-radius: 14px;
    line-height: 1.65;
    font-size: 0.97rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.her  .bubble { background: var(--her-bubble); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); border-top-right-radius: 4px; color: #cde; }

  /* italicize *action* text */
  .bubble em { font-style: italic; color: var(--accent2); }

  .typing-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: blink 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── Suggestion chips ── */
  #suggestions {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.5rem 1rem;
    display: none;
    flex-wrap: wrap;
    gap: 0.5rem;
    max-height: 30vh;
    overflow-y: auto;
  }

  .suggestion-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--accent2);
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
    line-height: 1.4;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .suggestion-chip:hover {
    background: var(--her-bubble);
    border-color: var(--accent);
  }

  #suggest-spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0.2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.6rem 1rem;
    padding-bottom: calc(0.6rem + env(safe-area-inset-bottom, 0px));
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
    overflow-y: auto;
    /* Prevent iOS from zooming in on focus (requires font-size >= 16px) */
    -webkit-text-size-adjust: 100%;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #btn-send {
    background: var(--accent);
    color: #fff;
    border-radius: 12px;
    width: 44px; height: 44px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #btn-send:hover:not(:disabled) { opacity: 0.85; }

  #btn-send svg { width: 20px; height: 20px; }

  /* ── Mobile overrides (≤ 480px) ── */
  @media (max-width: 480px) {
    /* Setup screen heading */
    .setup-step h1 { font-size: 1.5rem; }

    /* Gender buttons — fill row on very small screens */
    .gender-buttons { gap: 0.75rem; }
    .gender-btn { padding: 1.2rem 1.2rem; min-width: 90px; }

    /* Chat header — tighter on small screens */
    #chat-header { padding: 0.6rem 0.75rem; }
    #char-name { font-size: 0.95rem; }
    #char-meta { font-size: 0.72rem; }

    /* Messages — wider bubbles on narrow screens */
    .msg { max-width: 90%; }
    .bubble { font-size: 0.95rem; }

    /* Input area */
    #input-area { padding: 0.5rem 0.75rem; padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px)); }

    /* Suggestion chips — slightly smaller text but keep min-height */
    .suggestion-chip { font-size: 0.82rem; padding: 0.5rem 0.85rem; }

    /* Save delete button needs explicit height so it doesn't collapse */
    .save-delete-btn { min-height: 44px !important; min-width: 44px !important; }

    /* Loading box narrower padding */
    #loading-overlay .loading-box { padding: 2rem 1.5rem; }

    /* Recap card edge padding */
    #recap-card { padding: 1.1rem 1rem; }
    #recap-actions { justify-content: stretch; }
    #recap-actions button { flex: 1; justify-content: center; }

    /* Journal dialog fills more of screen */
    .journal-dialog { max-height: 92vh; }
  }

  /* Prevent iOS rubber-band scroll from revealing bg behind input bar */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #chat-screen {
      padding-bottom: 0;
    }
  }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════ SETUP -->
<div id="setup-screen">

  <!-- Step 0: Saved sessions (shown if saves exist) -->
  <div class="setup-step" id="step-saves">
    <h1>Continue a Story</h1>
    <p class="subtitle">Pick up where you left off</p>
    <div id="saves-list"></div>
    <button class="btn-back" id="btn-new-from-saves" style="align-self: center; margin-top: 1.5rem;">↓ New Story</button>
  </div>

  <!-- Step 1: Gender picker -->
  <div class="setup-step active" id="step-gender">
    <h1>Story Roleplay</h1>
    <p class="subtitle">Step inside a story. Who will you be?</p>
    <div class="gender-buttons">
      <button class="gender-btn female" data-gender="female">
        <span class="symbol">♀</span>
        <span class="label">Woman</span>
      </button>
      <button class="gender-btn male" data-gender="male">
        <span class="symbol">♂</span>
        <span class="label">Man</span>
      </button>
      <button class="gender-btn random" data-gender="auto">
        <span class="symbol">✦</span>
        <span class="label">Random</span>
      </button>
    </div>
  </div>

  <!-- Step 2: Story picker -->
  <div class="setup-step" id="step-stories">
    <div class="stories-header">
      <button class="btn-back" id="btn-back">← Back</button>
      <h2>Choose a Story</h2>
    </div>
    <div id="story-list"></div>
    <div id="setup-status"></div>
  </div>

  <select id="model-select" hidden></select>
</div>

<!-- ═══════════════════════════════════════════════════ CHAT -->
<div id="chat-screen">
  <div id="chat-header">
    <div id="char-avatar">♥</div>
    <div id="char-info">
      <div id="char-name">—</div>
      <div id="char-meta">—</div>
    </div>
    <div id="chat-header-icons">
      <div id="tts-indicator" title="Speaking…"></div>
      <span id="affinity-dot" title="" aria-label="Affinity">♥&#xFE0E;</span>
      <button id="btn-save" title="Save progress" type="button" style="background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; padding: 0.55rem 0.75rem; border-radius: 8px; cursor: pointer; line-height: 1; min-width: 44px; min-height: 44px;">💾</button>
      <button id="btn-view-recap" title="View relationship recap" type="button" style="background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; padding: 0.55rem 0.75rem; border-radius: 8px; cursor: pointer; line-height: 1; min-width: 44px; min-height: 44px;">📊</button>
      <button id="btn-mute" title="Toggle voice">🔊</button>
      <button id="btn-journal" title="Journal">
        <span class="journal-icon">✦</span>
        <span id="journal-badge" class="journal-badge" style="display:none;">0</span>
      </button>
    </div>
    <button id="btn-new-story">New Story</button>
  </div>

  <div id="journal-modal" class="journal-modal" style="display:none;">
    <div class="journal-dialog">
      <div class="journal-header">
        <h3 id="journal-title-text">Journal</h3>
        <button id="btn-journal-close" class="journal-close" title="Close">×</button>
      </div>
      <div id="journal-list" class="journal-list"></div>
    </div>
  </div>

  <div id="journal-toast" class="journal-toast" style="display:none;"></div>
  <div id="affinity-toast" class="journal-toast" style="display:none; bottom: 5rem;"></div>

  <div id="loading-overlay" style="display:none;">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <div class="loading-msg" id="loading-msg">Preparing your story…</div>
    </div>
  </div>

  <div id="prior-banner"></div>

  <div id="messages"></div>

  <div id="suggestions"><div id="suggest-spinner"></div></div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Say or do something…"></textarea>
    <button id="btn-send" title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ SAVE MODAL -->
<div id="save-modal" role="dialog" aria-modal="true" aria-label="Saving…" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem 2.5rem; text-align:center; color:var(--text);">
    <div style="font-size:1.6rem; margin-bottom:0.6rem;">💾</div>
    <div style="font-size:0.95rem; color:var(--muted);">Saving… this could take a while</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ RECAP MODAL -->
<div id="recap-modal" role="dialog" aria-modal="true">
  <div id="recap-card">
    <h2 id="recap-title">How it went</h2>
    <div class="recap-row">
      <span class="recap-label" id="recap-label-trust">Trust</span>
      <span class="recap-value" id="recap-val-trust">—</span>
      <svg class="recap-spark" id="recap-spark-trust" viewBox="0 0 100 22" preserveAspectRatio="none"></svg>
    </div>
    <div class="recap-row">
      <span class="recap-label" id="recap-label-intimacy">Intimacy</span>
      <span class="recap-value" id="recap-val-intimacy">—</span>
      <svg class="recap-spark" id="recap-spark-intimacy" viewBox="0 0 100 22" preserveAspectRatio="none"></svg>
    </div>
    <div class="recap-row">
      <span class="recap-label" id="recap-label-tension">Tension</span>
      <span class="recap-value" id="recap-val-tension">—</span>
      <svg class="recap-spark" id="recap-spark-tension" viewBox="0 0 100 22" preserveAspectRatio="none"></svg>
    </div>
    <div id="recap-narrative"></div>
    <div id="recap-actions">
      <button id="recap-close" type="button">Close</button>
      <button id="recap-new" class="primary" type="button">Start New Story</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const URL_LANG = new URLSearchParams(location.search).get('lang') === 'ja' ? 'ja' : 'en';

// ── Affinity i18n ─────────────────────────────────────
const AFFINITY_I18N = {
  en: {
    trust: 'Trust', intimacy: 'Intimacy', tension: 'Tension',
    title: 'How it went',
    priorPrefix: 'Last time you left them at',
    close: 'Close', newStory: 'Start New Story',
    aria: 'Affinity',
  },
  ja: {
    trust: '信頼', intimacy: '親密さ', tension: '緊張',
    title: '今回の結末',
    priorPrefix: '前回、あなたが残したのは',
    close: '閉じる', newStory: '新しい物語を始める',
    aria: '親密度',
  },
};
const _aff_t = AFFINITY_I18N[URL_LANG];
// Apply static labels
document.addEventListener('DOMContentLoaded', () => {
  $('recap-title').textContent = _aff_t.title;
  $('recap-label-trust').textContent = _aff_t.trust;
  $('recap-label-intimacy').textContent = _aff_t.intimacy;
  $('recap-label-tension').textContent = _aff_t.tension;
  $('recap-close').textContent = _aff_t.close;
  $('recap-new').textContent = _aff_t.newStory;
  $('affinity-dot').setAttribute('aria-label', _aff_t.aria);
  // Initialize mute button to show TTS is off by default
  $('btn-mute').textContent = '🔇';
  $('btn-mute').classList.add('muted');
});

let currentAffinity = null;
let currentAffinityHistory = [];
let prevAffinityLevels = null;

let charName = 'Her';
let npcGender = 'female';
let streaming = false;
let muted = true;
let currentAudio = null;
let suggestController = null;
let streamController = null;
let selectedGender = 'auto';
let storiesCache = [];

// ── Step navigation ───────────────────────────────────
function showStep(id) {
  document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ── Gender picker ─────────────────────────────────────
document.querySelectorAll('.gender-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedGender = btn.dataset.gender;
    renderStoryList();
    showStep('step-stories');
  });
});

$('btn-back').addEventListener('click', () => showStep('step-gender'));

// ── Load stories & saves ─────────────────────────────
let savedSessions = [];
async function loadStories() {
  try {
    const res = await fetch(`/stories?lang=${URL_LANG}&analyzed=1`);
    const data = await res.json();
    storiesCache = data.stories || [];
  } catch {
    storiesCache = [];
  }
  try {
    const res = await fetch('/saves');
    const data = await res.json();
    savedSessions = data.saves || [];
  } catch {
    savedSessions = [];
  }
  // If saves exist, show step-saves; otherwise show step-gender
  if (savedSessions.length > 0) {
    renderSavesList();
    showStep('step-saves');
  } else {
    showStep('step-gender');
  }
}

function renderSavesList() {
  const list = $('saves-list');
  list.innerHTML = '';
  savedSessions.forEach(save => {
    const container = document.createElement('div');
    container.style.display = 'flex';
    container.style.gap = '0.5rem';
    container.style.alignItems = 'stretch';

    const card = document.createElement('button');
    card.className = 'save-card';
    card.style.flex = '1';
    const storyTitle = save.story.replace(/\.txt$/i, '').replace(/[-_]/g, ' ');
    const timestamp = new Date(save.saved_at).toLocaleDateString() + ' ' +
                      new Date(save.saved_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    card.innerHTML = `
      <div class="save-title">${escapeHtml(storyTitle)}</div>
      <div class="save-meta">Playing as <strong>${escapeHtml(save.player_name)}</strong> with <strong>${escapeHtml(save.other_name)}</strong></div>
      <div class="save-meta">${escapeHtml(timestamp)}</div>`;
    card.addEventListener('click', () => resumeSession(save.id));

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'save-delete-btn';
    deleteBtn.textContent = '✕';
    deleteBtn.title = 'Delete save';
    deleteBtn.style.background = 'transparent';
    deleteBtn.style.border = '1px solid var(--border)';
    deleteBtn.style.borderRadius = 'var(--radius)';
    deleteBtn.style.color = 'var(--muted)';
    deleteBtn.style.minWidth = '44px';
    deleteBtn.style.minHeight = '44px';
    deleteBtn.style.cursor = 'pointer';
    deleteBtn.style.fontSize = '0.9rem';
    deleteBtn.style.display = 'flex';
    deleteBtn.style.alignItems = 'center';
    deleteBtn.style.justifyContent = 'center';
    deleteBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (confirm(`Delete save "${storyTitle}"?`)) {
        try {
          const res = await fetch(`/saves/${save.id}`, { method: 'DELETE' });
          if (res.ok) {
            savedSessions = savedSessions.filter(s => s.id !== save.id);
            renderSavesList();
          }
        } catch {}
      }
    });

    container.appendChild(card);
    container.appendChild(deleteBtn);
    list.appendChild(container);
  });
}

function renderStoryList() {
  const list = $('story-list');
  list.innerHTML = '';

  // Random card first
  const randomCard = document.createElement('button');
  randomCard.className = 'story-card';
  randomCard.innerHTML = `
    <div class="story-title">✦ Random</div>
    <div class="story-summary">Let fate choose — any story, any setting.</div>`;
  randomCard.addEventListener('click', () => startStory('random'));
  list.appendChild(randomCard);

  storiesCache.forEach(({ name, summary }) => {
    const title = name.replace(/\.txt$/i, '').replace(/[-_]/g, ' ');
    const card = document.createElement('button');
    card.className = 'story-card';
    card.innerHTML = `
      <div class="story-title">${escapeHtml(title)}</div>
      ${summary ? `<div class="story-summary">${escapeHtml(summary)}</div>` : ''}`;
    card.addEventListener('click', () => startStory(name));
    list.appendChild(card);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setCharMeta(setting, stage) {
  const el = $('char-meta');
  const full = [setting, stage].filter(Boolean).join(' · ');
  const sentences = full.match(/[^.!?]+[.!?]+(?:\s|$)|[^.!?]+$/g) || [full];
  if (sentences.length <= 1) { el.textContent = full; return; }
  const short = sentences.slice(0, 1).join('').trimEnd();
  let expanded = false;
  function render() {
    el.innerHTML = expanded
      ? escapeHtml(full) + ' <button id="char-meta-expand">show less</button>'
      : escapeHtml(short) + '… <button id="char-meta-expand">show more</button>';
    $('char-meta-expand').addEventListener('click', () => { expanded = !expanded; render(); });
  }
  render();
}

// ── Load models ──────────────────────────────────────
async function loadModels() {
  try {
    const res = await fetch('/models');
    const data = await res.json();
    const sel = $('model-select');
    sel.innerHTML = '';
    data.models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    });
    applyLangDefault();
  } catch {
    $('model-select').innerHTML = '<option value="nemo">nemo latest</option>';
  }
}

function pickModel(preferred) {
  const sel = $('model-select');
  const opts = Array.from(sel.options);
  for (const key of preferred) {
    const match = opts.find(o => o.value.toLowerCase().includes(key));
    if (match) { sel.value = match.value; return true; }
  }
  return false;
}

function applyLangDefault() {
  if (URL_LANG === 'ja') pickModel(['qwen']);
  else                   pickModel(['nemo', 'mistral']);
}

// ── Start ────────────────────────────────────────────
async function startStory(story) {
  const model = $('model-select').value;
  const lang = URL_LANG;

  // Disable all story cards while loading
  $('story-list').querySelectorAll('.story-card').forEach(c => c.disabled = true);
  showLoadingOverlay('Preparing your story…');

  try {
    const res = await fetch('/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, story, player_gender: selectedGender, lang }),
    });

    const data = await res.json();
    if (data.error) {
      hideLoadingOverlay();
      setStatus('Error: ' + data.error);
      $('story-list').querySelectorAll('.story-card').forEach(c => c.disabled = false);
      return;
    }

    charName = data.name || 'Her';
    npcGender = data.other_gender || 'female';
    const playerName = data.player_name || 'You';
    $('char-name').textContent = playerName;
    setCharMeta(data.setting, data.stage);
    $('char-avatar').textContent = playerName[0] || '♥';

    currentAffinity = data.affinity || null;
    currentAffinityHistory = [];
    prevAffinityLevels = currentAffinity ? _affinityLevelsFor(currentAffinity) : null;
    updateAffinityDot(currentAffinity);

    $('messages').innerHTML = '';
    hideLoadingOverlay();
    setStatus('');
    $('setup-screen').style.display = 'none';
    $('chat-screen').style.display = 'flex';

    await streamResponse('/open', null);

  } catch (err) {
    hideLoadingOverlay();
    setStatus('Error: ' + err.message);
    $('story-list').querySelectorAll('.story-card').forEach(c => c.disabled = false);
  }
}

async function resumeSession(saveId) {
  setStatus('Resuming your story…');
  try {
    const res = await fetch('/resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ save_id: saveId }),
    });

    const data = await res.json();
    if (data.error) {
      setStatus('Error: ' + data.error);
      return;
    }

    charName = data.name || 'Her';
    npcGender = data.other_gender || 'female';
    const playerName = data.player_name || 'You';
    $('char-name').textContent = playerName;
    setCharMeta(data.setting, data.stage);
    $('char-avatar').textContent = playerName[0] || '♥';

    currentAffinity = data.affinity || null;
    currentAffinityHistory = [];
    prevAffinityLevels = currentAffinity ? _affinityLevelsFor(currentAffinity) : null;
    updateAffinityDot(currentAffinity);

    // Show the session summary as a recap
    $('messages').innerHTML = '';
    if (data.summary) {
      const recap = document.createElement('div');
      recap.className = 'recap-block';
      recap.textContent = data.summary;
      $('messages').appendChild(recap);
    }

    setStatus('');
    $('setup-screen').style.display = 'none';
    $('chat-screen').style.display = 'flex';
    scrollToBottom();

  } catch (err) {
    setStatus('Error: ' + err.message);
  }
}

// ── New story ────────────────────────────────────────
function resetToSetup() {
  if (streamController) { streamController.abort(); streamController = null; }
  clearSuggestions();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  $('messages').innerHTML = '';
  $('prior-banner').style.display = 'none';
  currentAffinity = null;
  currentAffinityHistory = [];
  $('chat-screen').style.display = 'none';
  $('setup-screen').style.display = 'flex';
  setStatus('');
  showStep('step-gender');
}

$('btn-new-story').addEventListener('click', async () => {
  // If the user has had any turns, offer a recap first.
  const hasPlayed = currentAffinity && (currentAffinityHistory.length > 0 || currentAffinity.turn > 0);
  if (hasPlayed) {
    await showRecapModal();
    return;
  }
  resetToSetup();
});

$('btn-new-from-saves').addEventListener('click', () => showStep('step-gender'));

$('btn-save').addEventListener('click', async () => {
  $('btn-save').disabled = true;
  const orig = $('btn-save').textContent;
  $('btn-save').textContent = '…';
  const modal = $('save-modal');
  modal.style.display = 'flex';
  try {
    const res = await fetch('/save', { method: 'POST' });
    const data = await res.json();
    modal.style.display = 'none';
    if (data.save_id) {
      $('btn-save').textContent = '✓';
      setTimeout(() => { $('btn-save').textContent = orig; $('btn-save').disabled = false; }, 2000);
    } else {
      $('btn-save').textContent = orig;
      $('btn-save').disabled = false;
    }
  } catch {
    modal.style.display = 'none';
    $('btn-save').textContent = orig;
    $('btn-save').disabled = false;
  }
});

$('recap-close').addEventListener('click', () => {
  $('recap-modal').classList.remove('active');
});
$('recap-new').addEventListener('click', () => {
  $('recap-modal').classList.remove('active');
  resetToSetup();
});
$('btn-view-recap').addEventListener('click', async () => {
  if (currentAffinity && currentAffinity.turn > 0) {
    await showRecapModal();
  }
});

// ── Send message ─────────────────────────────────────
$('btn-send').addEventListener('click', sendMessage);

$('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea; hide suggestions when user starts typing their own text
$('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  if (this.value.trim()) clearSuggestions();
});

async function sendMessage() {
  if (streaming) return;
  const input = $('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  await streamResponse('/chat', { message: text });
}

// ── Suggestions ──────────────────────────────────────
function clearSuggestions() {
  if (suggestController) { suggestController.abort(); suggestController = null; }
  const el = $('suggestions');
  el.style.display = 'none';
  el.innerHTML = '<div id="suggest-spinner"></div>';
}

async function loadSuggestions() {
  clearSuggestions();
  const el = $('suggestions');
  const spinner = $('suggest-spinner');
  spinner.style.display = 'block';
  el.style.display = 'flex';
  const controller = new AbortController();
  suggestController = controller;
  try {
    const res = await fetch('/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
      signal: controller.signal,
    });
    const data = await res.json();
    if (controller.signal.aborted) return;
    spinner.style.display = 'none';
    const chips = data.suggestions || [];
    if (!chips.length) { el.style.display = 'none'; return; }
    chips.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-chip';
      btn.textContent = text;
      btn.addEventListener('click', () => {
        clearSuggestions();
        const input = $('user-input');
        input.value = text;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        sendMessage();
      });
      el.appendChild(btn);
    });
    el.style.display = 'flex';
  } catch (e) {
    spinner.style.display = 'none';
    el.style.display = 'none';
    if (e.name !== 'AbortError') console.warn('Suggest error:', e);
  }
}

// ── Streaming ─────────────────────────────────────────
async function streamResponse(url, body) {
  clearSuggestions();
  streaming = true;
  $('btn-send').disabled = true;
  let fullText = '';

  const typingEl = appendTyping();
  const controller = new AbortController();
  streamController = controller;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: body ? { 'Content-Type': 'application/json' } : {},
      body: body ? JSON.stringify(body) : null,
      signal: controller.signal,
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let msgEl = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.error) { console.error(data.error); break; }
          if (data.journal_unlock) { handleJournalUnlock(data.journal_unlock); continue; }
          if (data.done && data.affinity) {
            checkAffinityLevelChanges(data.affinity);
            currentAffinity = data.affinity;
            updateAffinityDot(currentAffinity);
          }
          if (data.token) {
            if (!msgEl) {
              typingEl.remove();
              msgEl = appendMessage('her', '');
            }
            fullText += data.token;
            msgEl.querySelector('.bubble').innerHTML = renderText(fullText);
            scrollToBottom();
          }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') console.warn('Stream error:', e);
  } finally {
    try { typingEl.remove(); } catch {}
    streaming = false;
    $('btn-send').disabled = false;
    if (streamController === controller) streamController = null;
    scrollToBottom();
    if (fullText && !controller.signal.aborted) {
      speakText(fullText);
      loadSuggestions();
      setTimeout(refreshAffinity, 2500);
    }
  }
}

// ── Affinity helpers ───────────────────────────────────
async function refreshAffinity() {
  try {
    const res = await fetch('/affinity');
    const data = await res.json();
    if (data.affinity) {
      currentAffinity = data.affinity;
      currentAffinityHistory = data.history || [];
      updateAffinityDot(currentAffinity);
    }
  } catch {}
}

function updateAffinityDot(a) {
  const el = $('affinity-dot');
  if (!el) return;
  if (!a) {
    el.style.color = '';
    el.style.opacity = '0.4';
    el.style.animationPlayState = 'paused';
    el.title = '';
    return;
  }
  // Hue: intimacy 0 = blue (240°), 5 = red (360°), 10 = warm gold (45°).
  // Stays in the blue→purple→red→orange band — never crosses green.
  const i = Math.max(0, Math.min(10, a.intimacy));
  let hue;
  if (i <= 5) hue = 240 + (360 - 240) * (i / 5);        // 240° → 360°
  else        hue = 0 + 45 * ((i - 5) / 5);              // 0° → 45°
  hue = ((hue % 360) + 360) % 360;
  const sat = 55 + a.trust * 2;   // 55–75%
  const light = 45 + a.trust * 1; // 45–55%
  el.style.color = `hsl(${hue}, ${sat}%, ${light}%)`;
  el.style.opacity = (0.55 + 0.045 * a.trust).toFixed(2);
  // Trust → size. 0 = 0.75rem, 10 = 1.45rem.
  el.style.fontSize = (0.75 + a.trust * 0.07).toFixed(2) + 'rem';
  // Tension → pulse speed. 0 = paused, 10 = ~0.7s.
  if (a.tension <= 0) {
    el.style.animationPlayState = 'paused';
  } else {
    const dur = (2.2 - 0.15 * a.tension).toFixed(2);
    el.style.animationDuration = `${dur}s`;
    el.style.animationPlayState = 'running';
  }
  el.title = a.last_reason || '';
}

function _affinityLevel(val) {
  if (val <= 3) return 'low';
  if (val <= 6) return 'medium';
  return 'high';
}

function _affinityLevelsFor(a) {
  return { trust: _affinityLevel(a.trust), intimacy: _affinityLevel(a.intimacy), tension: _affinityLevel(a.tension) };
}

const _affinityToastQueue = [];
let _affinityToastTimer = null;

function _drainAffinityToastQueue() {
  if (!_affinityToastQueue.length) { _affinityToastTimer = null; return; }
  const toast = $('affinity-toast');
  toast.textContent = _affinityToastQueue.shift();
  toast.style.display = 'block';
  clearTimeout(_affinityToastTimer);
  _affinityToastTimer = setTimeout(() => {
    toast.style.display = 'none';
    _drainAffinityToastQueue();
  }, 2200);
}

function _queueAffinityToast(msg) {
  _affinityToastQueue.push(msg);
  if (!_affinityToastTimer) _drainAffinityToastQueue();
}

const _affinityMessages = {
  trust: {
    up: { medium: 'Trust is growing', high: 'Trust has fully deepened' },
    down: { medium: 'Trust is wavering', low: 'Trust is crumbling' },
  },
  intimacy: {
    up: { medium: 'Intimacy is growing', high: 'A deep bond has formed' },
    down: { medium: 'Intimacy is fading', low: 'The bond has cooled' },
  },
  tension: {
    up: { medium: 'Tension is building', high: 'Tension is at a breaking point' },
    down: { medium: 'Tension is easing', low: 'The tension has dissolved' },
  },
};

function checkAffinityLevelChanges(newAffinity) {
  if (!newAffinity) return;
  const newLevels = _affinityLevelsFor(newAffinity);
  if (!prevAffinityLevels) { prevAffinityLevels = newLevels; return; }
  const order = { low: 0, medium: 1, high: 2 };
  for (const dim of ['trust', 'intimacy', 'tension']) {
    const oldL = prevAffinityLevels[dim], newL = newLevels[dim];
    if (oldL === newL) continue;
    const rising = order[newL] > order[oldL];
    const msgs = _affinityMessages[dim][rising ? 'up' : 'down'];
    if (msgs[newL]) _queueAffinityToast(msgs[newL]);
  }
  prevAffinityLevels = newLevels;
}

function renderPriorBanner(prior) {
  const el = $('prior-banner');
  if (!prior || !prior.final) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  const f = prior.final;
  const line = `${_aff_t.priorPrefix} <strong>${_aff_t.trust} ${f.trust}/10, ${_aff_t.intimacy} ${f.intimacy}/10, ${_aff_t.tension} ${f.tension}/10</strong>`;
  const narrative = prior.narrative ? ` — <em>${escapeHtml(prior.narrative)}</em>` : '';
  el.innerHTML = line + narrative;
  el.style.display = 'block';
}

function renderSparkline(svgId, values, hue) {
  const svg = $(svgId);
  if (!svg) return;
  svg.innerHTML = '';
  if (!values.length) return;
  const W = 100, H = 22;
  const n = values.length;
  const step = n > 1 ? W / (n - 1) : 0;
  const pts = values.map((v, i) => `${(i * step).toFixed(1)},${(H - (v / 10) * H).toFixed(1)}`).join(' ');
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  line.setAttribute('points', pts);
  line.setAttribute('stroke', `hsl(${hue}, 60%, 60%)`);
  svg.appendChild(line);
}

async function showRecapModal() {
  // Render with cached values immediately so modal doesn't feel laggy.
  const a = currentAffinity || { trust: 0, intimacy: 0, tension: 0 };
  $('recap-val-trust').textContent = `${a.trust}/10`;
  $('recap-val-intimacy').textContent = `${a.intimacy}/10`;
  $('recap-val-tension').textContent = `${a.tension}/10`;
  $('recap-narrative').textContent = '…';
  renderSparkline('recap-spark-trust', currentAffinityHistory.map(e => e.trust), 340);
  renderSparkline('recap-spark-intimacy', currentAffinityHistory.map(e => e.intimacy), 20);
  renderSparkline('recap-spark-tension', currentAffinityHistory.map(e => e.tension), 200);
  $('recap-modal').classList.add('active');

  try {
    const res = await fetch('/recap', { method: 'POST' });
    const data = await res.json();
    if (data.final) {
      $('recap-val-trust').textContent = `${data.final.trust}/10`;
      $('recap-val-intimacy').textContent = `${data.final.intimacy}/10`;
      $('recap-val-tension').textContent = `${data.final.tension}/10`;
    }
    if (data.history) {
      renderSparkline('recap-spark-trust', data.history.map(e => e.trust), 340);
      renderSparkline('recap-spark-intimacy', data.history.map(e => e.intimacy), 20);
      renderSparkline('recap-spark-tension', data.history.map(e => e.tension), 200);
    }
    $('recap-narrative').textContent = data.narrative || '';
  } catch {
    $('recap-narrative').textContent = '';
  }
}

// ── DOM helpers ───────────────────────────────────────
function appendMessage(role, text) {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'her' ? (charName[0] || '♥') : 'You'[0];

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function appendTyping() {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = 'msg her';
  div.innerHTML = `
    <div class="msg-avatar">${charName[0] || '♥'}</div>
    <div class="bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function renderText(text) {
  // Escape HTML, then italicize *action* blocks
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(/\*([^*\n]+)\*/g, '<em>*$1*</em>');
}

function scrollToBottom() {
  const msgs = $('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(msg) {
  $('setup-status').textContent = msg;
}

function showLoadingOverlay(msg) {
  $('loading-msg').textContent = msg || 'Preparing your story…';
  $('loading-overlay').style.display = 'flex';
}

function hideLoadingOverlay() {
  $('loading-overlay').style.display = 'none';
}

// ── Mute toggle ──────────────────────────────────────
$('btn-mute').addEventListener('click', () => {
  muted = !muted;
  $('btn-mute').textContent = muted ? '🔇' : '🔊';
  $('btn-mute').classList.toggle('muted', muted);
  if (muted && currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    $('tts-indicator').classList.remove('active');
  }
});

// ── TTS ───────────────────────────────────────────────
async function speakText(text) {
  if (muted || !text.trim()) return;
  // Stop any currently playing audio
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  try {
    const res = await fetch('/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    $('tts-indicator').classList.add('active');
    audio.addEventListener('ended', () => {
      URL.revokeObjectURL(url);
      if (currentAudio === audio) {
        currentAudio = null;
        $('tts-indicator').classList.remove('active');
      }
    });
    audio.addEventListener('error', () => {
      URL.revokeObjectURL(url);
      if (currentAudio === audio) {
        currentAudio = null;
        $('tts-indicator').classList.remove('active');
      }
    });
    await audio.play();
  } catch (e) {
    console.warn('TTS error:', e);
  }
}

// ── Journal ───────────────────────────────────────────
let journalNewCount = 0;
let journalAudio = null;

function handleJournalUnlock(entry) {
  journalNewCount += 1;
  const badge = $('journal-badge');
  badge.textContent = journalNewCount;
  badge.style.display = 'inline-block';
  $('btn-journal').classList.add('has-new');
  const npcName = entry.npc_name || charName || 'the NPC';
  showJournalToast(`You've unlocked one of ${npcName}'s journal entries!`);
}

function showJournalToast(text) {
  const toast = $('journal-toast');
  toast.textContent = text;
  toast.style.display = 'block';
  clearTimeout(showJournalToast._t);
  showJournalToast._t = setTimeout(() => { toast.style.display = 'none'; }, 3500);
}

function resetJournalBadge() {
  journalNewCount = 0;
  $('journal-badge').style.display = 'none';
  $('btn-journal').classList.remove('has-new');
}

async function openJournal() {
  try {
    const res = await fetch('/journal');
    if (!res.ok) return;
    const data = await res.json();
    renderJournal(data.entries || []);
    $('journal-modal').style.display = 'flex';
    resetJournalBadge();
  } catch (e) { console.warn('Journal load error:', e); }
}

function closeJournal() {
  $('journal-modal').style.display = 'none';
  if (journalAudio) { journalAudio.pause(); journalAudio = null; }
}

function renderJournal(entries) {
  const list = $('journal-list');
  list.innerHTML = '';
  if (!entries.length) {
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted);font-style:italic;">No journal entries yet. Keep going…</div>';
    return;
  }
  entries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'journal-entry' + (e.unlocked ? '' : ' locked');
    const title = document.createElement('div');
    title.className = 'je-title';
    title.textContent = e.unlocked ? e.title : '— locked —';
    div.appendChild(title);
    if (e.unlocked) {
      const body = document.createElement('div');
      body.className = 'je-body';
      body.textContent = e.body || '';
      const play = document.createElement('button');
      play.className = 'je-play';
      play.textContent = `▶ Play in ${npcGender === 'male' ? 'his' : 'her'} voice`;
      play.addEventListener('click', ev => { ev.stopPropagation(); playJournalEntry(e.id, play); });
      div.appendChild(body);
      div.appendChild(play);
      div.addEventListener('click', () => div.classList.toggle('open'));
    }
    list.appendChild(div);
  });
}

async function playJournalEntry(id, btn) {
  if (journalAudio) { journalAudio.pause(); journalAudio = null; }
  const origLabel = btn.textContent;
  btn.textContent = '… loading';
  btn.disabled = true;
  try {
    const res = await fetch('/journal/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    if (!res.ok) { btn.textContent = origLabel; btn.disabled = false; return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    journalAudio = audio;
    btn.textContent = '■ Stop';
    btn.disabled = false;
    const cleanup = () => {
      URL.revokeObjectURL(url);
      btn.textContent = origLabel;
      if (journalAudio === audio) journalAudio = null;
    };
    audio.addEventListener('ended', cleanup);
    audio.addEventListener('error', cleanup);
    btn.onclick = ev => {
      ev.stopPropagation();
      audio.pause();
      cleanup();
      btn.onclick = null;
      btn.addEventListener('click', ev2 => { ev2.stopPropagation(); playJournalEntry(id, btn); });
    };
    await audio.play();
  } catch (e) {
    console.warn('Journal TTS error:', e);
    btn.textContent = origLabel;
    btn.disabled = false;
  }
}

$('btn-journal').addEventListener('click', openJournal);
$('btn-journal-close').addEventListener('click', closeJournal);
$('journal-modal').addEventListener('click', e => {
  if (e.target.id === 'journal-modal') closeJournal();
});

// Reset journal state when starting a new story
$('btn-new-story').addEventListener('click', () => { resetJournalBadge(); });

// ── Init ──────────────────────────────────────────────
loadStories();
loadModels();
</script>
