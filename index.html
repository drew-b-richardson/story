<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Roleplay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0d0e;
    --surface: #1a1618;
    --surface2: #221e20;
    --border: #2e2628;
    --accent: #c8748a;
    --accent2: #e8a0b0;
    --text: #e8dfe2;
    --muted: #7a6b70;
    --user-bubble: #1e2a32;
    --her-bubble: #2a1a1f;
    --radius: 16px;
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Setup screen ── */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    flex: 1;
    padding: 2rem;
    gap: 1.5rem;
    overflow-y: auto;
  }

  #setup-screen h1 {
    font-size: 2rem;
    font-weight: normal;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  #setup-screen p.subtitle {
    color: var(--muted);
    font-style: italic;
    font-size: 0.95rem;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 42px;
    line-height: 1.6;
  }

  .file-row {
    display: flex;
    gap: 0.6rem;
  }

  .file-row input[type="file"] { display: none; }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.65rem 1.2rem;
    transition: opacity 0.15s, background 0.15s;
  }

  button:disabled { opacity: 0.4; cursor: default; }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-secondary:hover:not(:disabled) { background: var(--border); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    padding: 0.8rem;
    width: 100%;
    letter-spacing: 0.05em;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.85; }

  #setup-status {
    text-align: center;
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    min-height: 1.4em;
  }

  /* ── Chat screen ── */
  #chat-screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #chat-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  #char-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: #fff;
    flex-shrink: 0;
  }

  #char-info { flex: 1; }
  #char-name { font-size: 1.05rem; color: var(--accent2); }
  #char-meta { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 0.1rem; }

  #btn-new-story {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
  }

  #btn-new-story:hover { border-color: var(--accent); color: var(--accent2); }

  #btn-mute {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    line-height: 1;
  }
  #btn-mute:hover { border-color: var(--accent); color: var(--accent2); }
  #btn-mute.muted { color: var(--border); border-color: var(--border); }

  #tts-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  #tts-indicator.active { opacity: 1; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .msg {
    display: flex;
    gap: 0.7rem;
    max-width: 78%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.her  { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    margin-top: 2px;
  }

  .msg.her  .msg-avatar { background: var(--accent); color: #fff; }
  .msg.user .msg-avatar { background: var(--user-bubble); color: var(--muted); border: 1px solid var(--border); }

  .bubble {
    padding: 0.75rem 1rem;
    border-radius: 14px;
    line-height: 1.65;
    font-size: 0.97rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.her  .bubble { background: var(--her-bubble); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); border-top-right-radius: 4px; color: #cde; }

  /* italicize *action* text */
  .bubble em { font-style: italic; color: var(--accent2); }

  .typing-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: blink 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.5rem 1rem;
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.97rem;
    padding: 0.5rem 0.9rem;
    outline: none;
    resize: none;
    max-height: 80px;
    line-height: 1.5;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #btn-send {
    background: var(--accent);
    color: #fff;
    border-radius: 12px;
    width: 42px; height: 42px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #btn-send:hover:not(:disabled) { opacity: 0.85; }

  #btn-send svg { width: 18px; height: 18px; }

  /* Summary panel */
  #summary-panel {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.7rem 1.2rem;
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
    display: none;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════ SETUP -->
<div id="setup-screen">
  <h1>Story Roleplay</h1>
  <p class="subtitle">A story will be chosen for you. Step inside it.</p>

  <div class="setup-card">
    <div>
      <label>Story</label>
      <select id="story-select">
        <option value="random">— Random —</option>
      </select>
    </div>

    <div>
      <label>Play as</label>
      <select id="gender-select">
        <option value="auto">— Auto (story decides) —</option>
        <option value="male">Male character</option>
        <option value="female">Female character</option>
      </select>
    </div>

    <div>
      <label>Ollama Model</label>
      <select id="model-select">
        <option value="">Loading models…</option>
      </select>
    </div>

    <button class="btn-primary" id="btn-start">Begin Story</button>
    <div id="setup-status"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ CHAT -->
<div id="chat-screen">
  <div id="chat-header">
    <div id="char-avatar">♥</div>
    <div id="char-info">
      <div id="char-name">—</div>
      <div id="char-meta">—</div>
    </div>
    <div id="tts-indicator" title="Speaking…"></div>
    <button id="btn-mute" title="Toggle voice">♪</button>
    <button id="btn-new-story">New Story</button>
  </div>

  <div id="summary-panel"></div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Say something…"></textarea>
    <button id="btn-send" title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

let charName = 'Her';
let streaming = false;
let muted = false;
let currentAudio = null;

// ── Load stories ─────────────────────────────────────
async function loadStories() {
  try {
    const res = await fetch('/stories');
    const data = await res.json();
    const sel = $('story-select');
    sel.innerHTML = '<option value="random">— Random —</option>';
    data.stories.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name.replace(/\.txt$/i, '').replace(/[-_]/g, ' ');
      sel.appendChild(opt);
    });
  } catch {
    // leave the default "Random" option
  }
}

// ── Load models ──────────────────────────────────────
async function loadModels() {
  try {
    const res = await fetch('/models');
    const data = await res.json();
    const sel = $('model-select');
    sel.innerHTML = '';
    data.models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      if (m === 'hf.co/mradermacher/mistralai-Mistral-Nemo-Instruct-2407-extensive-BP-abliteration-12B-GGUF:Q4_K_M') opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {
    $('model-select').innerHTML = '<option value="hf.co/mradermacher/mistralai-Mistral-Nemo-Instruct-2407-extensive-BP-abliteration-12B-GGUF:Q4_K_M">nemo latest</option>';
  }
}

// ── Start ────────────────────────────────────────────
$('btn-start').addEventListener('click', startStory);

async function startStory() {
  const model = $('model-select').value;
  const story = $('story-select').value;
  const playerGender = $('gender-select').value;

  $('btn-start').disabled = true;
  setStatus('Analyzing story and building character…');

  try {
    const res = await fetch('/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, story, player_gender: playerGender }),
    });

    const data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error); $('btn-start').disabled = false; return; }

    charName = data.name || 'Her';
    $('char-name').textContent = charName;
    $('char-meta').textContent = [data.setting, data.stage].filter(Boolean).join(' · ');
    $('char-avatar').textContent = charName[0] || '♥';

    if (data.summary) {
      $('summary-panel').textContent = data.summary;
      $('summary-panel').style.display = 'block';
    }

    $('messages').innerHTML = '';
    $('setup-screen').style.display = 'none';
    $('chat-screen').style.display = 'flex';

    // Get opening message
    await streamResponse('/open', null);

  } catch (err) {
    setStatus('Error: ' + err.message);
    $('btn-start').disabled = false;
  }
}

// ── New story ────────────────────────────────────────
$('btn-new-story').addEventListener('click', () => {
  $('chat-screen').style.display = 'none';
  $('setup-screen').style.display = 'flex';
  $('summary-panel').style.display = 'none';
  $('btn-start').disabled = false;
  setStatus('');
});

// ── Send message ─────────────────────────────────────
$('btn-send').addEventListener('click', sendMessage);

$('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
$('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

async function sendMessage() {
  if (streaming) return;
  const input = $('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  await streamResponse('/chat', { message: text });
}

// ── Streaming ─────────────────────────────────────────
async function streamResponse(url, body) {
  streaming = true;
  $('btn-send').disabled = true;
  let fullText = '';

  const typingEl = appendTyping();

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: body ? { 'Content-Type': 'application/json' } : {},
      body: body ? JSON.stringify(body) : null,
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let msgEl = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.error) { console.error(data.error); break; }
          if (data.token) {
            if (!msgEl) {
              typingEl.remove();
              msgEl = appendMessage('her', '');
            }
            fullText += data.token;
            msgEl.querySelector('.bubble').innerHTML = renderText(fullText);
            scrollToBottom();
          }
        } catch {}
      }
    }
  } finally {
    try { typingEl.remove(); } catch {}
    streaming = false;
    $('btn-send').disabled = false;
    scrollToBottom();
    if (fullText) speakText(fullText);
  }
}

// ── DOM helpers ───────────────────────────────────────
function appendMessage(role, text) {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'her' ? (charName[0] || '♥') : 'You'[0];

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function appendTyping() {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = 'msg her';
  div.innerHTML = `
    <div class="msg-avatar">${charName[0] || '♥'}</div>
    <div class="bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function renderText(text) {
  // Escape HTML, then italicize *action* blocks
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(/\*([^*\n]+)\*/g, '<em>*$1*</em>');
}

function scrollToBottom() {
  const msgs = $('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(msg) {
  $('setup-status').textContent = msg;
}

// ── Mute toggle ──────────────────────────────────────
$('btn-mute').addEventListener('click', () => {
  muted = !muted;
  $('btn-mute').textContent = muted ? '♪̶' : '♪';
  $('btn-mute').classList.toggle('muted', muted);
  if (muted && currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    $('tts-indicator').classList.remove('active');
  }
});

// ── TTS ───────────────────────────────────────────────
async function speakText(text) {
  if (muted || !text.trim()) return;
  // Stop any currently playing audio
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  try {
    const res = await fetch('/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    $('tts-indicator').classList.add('active');
    audio.addEventListener('ended', () => {
      URL.revokeObjectURL(url);
      if (currentAudio === audio) {
        currentAudio = null;
        $('tts-indicator').classList.remove('active');
      }
    });
    audio.addEventListener('error', () => {
      URL.revokeObjectURL(url);
      if (currentAudio === audio) {
        currentAudio = null;
        $('tts-indicator').classList.remove('active');
      }
    });
    await audio.play();
  } catch (e) {
    console.warn('TTS error:', e);
  }
}

// ── Init ──────────────────────────────────────────────
loadStories();
loadModels();
</script>
</body>
</html>
